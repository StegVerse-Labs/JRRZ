<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1600"
    height="1000"
    viewBox="0 0 1600 1000"
    role="img"
    aria-labelledby="title desc">
  <title id="title">Joint Replacement Recovery Trajectory</title>
  <desc id="desc">A clinical-style recovery trajectory chart showing pre-operative baseline, surgery dip, typical recovery range, and phased recovery timeline.</desc>

  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #173d5a; }
      .axis { stroke: #66788a; stroke-width: 3; }
      .tick { stroke: #9aa9b8; stroke-width: 2; }
      .grid { stroke: #d8e0e8; stroke-width: 1.5; stroke-dasharray: 6 8; }
      .label { font: 400 18px Arial, Helvetica, sans-serif; fill: #334155; }
      .small { font: 400 15px Arial, Helvetica, sans-serif; fill: #475569; }
      .axislabel { font: 400 20px Arial, Helvetica, sans-serif; fill: #334155; }
      .phaselabel { font: 600 16px Arial, Helvetica, sans-serif; fill: #1f2a44; }
      .bandLabel { font: 600 17px Arial, Helvetica, sans-serif; fill: #215b84; }
      .curve { fill: none; stroke: #1f78b4; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .band { fill: #d7e9f7; opacity: 0.95; stroke: #a6c9e8; stroke-width: 1.5; }
      .baseline { stroke: #2b6f9e; stroke-width: 2.5; stroke-dasharray: 7 8; }
      .marker { fill: #1f78b4; stroke: #175d8a; stroke-width: 1.5; }
      .phase1 { fill: #e8eef3; }
      .phase2 { fill: #dbe7f2; }
      .phase3 { fill: #eaf2fb; }
      .phase4 { fill: #edf4ee; }
      .phase5 { fill: #f4efe7; }
      .connector { fill: #ffffff; opacity: 0.85; }
      .foot { font: 400 14px Arial, Helvetica, sans-serif; fill: #64748b; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1000"/>

  <text class="title" x="800" y="72" text-anchor="middle">Joint Replacement Recovery Trajectory</text>

  <!-- Plot area -->
  <g id="plot">
    <!-- axes -->
    <line class="axis" x1="170" y1="790" x2="1440" y2="790"/>
    <line class="axis" x1="170" y1="790" x2="170" y2="140"/>

    <!-- arrowheads -->
    <polygon points="1440,790 1417,779 1417,801" fill="#66788a"/>
    <polygon points="170,140 159,163 181,163" fill="#66788a"/>

    <!-- baseline/grid -->
    <line class="grid" x1="170" y1="480" x2="1340" y2="480"/>
    <line class="baseline" x1="170" y1="480" x2="1340" y2="480"/>

    <!-- vertical guide at pre-op -->
    <line class="grid" x1="270" y1="480" x2="270" y2="790"/>
    <!-- surgery guide -->
    <line class="grid" x1="400" y1="585" x2="400" y2="790"/>

    <!-- band -->
    <path class="band"
      d="M 270 480
         C 330 495, 355 540, 400 615
         C 510 610, 650 555, 790 470
         C 930 395, 1080 350, 1330 322
         L 1330 215
         C 1100 238, 935 278, 785 360
         C 650 432, 520 480, 400 515
         C 350 510, 320 500, 270 480 Z"/>

    <!-- recovery curve -->
    <path class="curve"
      d="M 270 480
         C 330 485, 355 540, 400 585
         C 505 600, 650 520, 790 430
         C 920 365, 1070 322, 1330 300"/>

    <!-- markers -->
    <circle class="marker" cx="270" cy="480" r="8"/>
    <circle class="marker" cx="400" cy="585" r="9"/>
    <circle class="marker" cx="790" cy="430" r="4.5"/>
    <circle class="marker" cx="1330" cy="300" r="4.5"/>

    <!-- labels -->
    <text class="bandLabel" x="770" y="315" text-anchor="middle">Typical Recovery Range</text>

    <text class="label" x="1460" y="770" text-anchor="end">Time</text>

    <text class="axislabel" x="48" y="340" transform="rotate(-90 48,340)" text-anchor="middle">
      Patient-Reported Outcome Score (WOMAC / HOOS / KOOS)
    </text>

    <text class="label" x="145" y="472" text-anchor="end">Pre-operative</text>
    <text class="label" x="145" y="497" text-anchor="end">baseline</text>

    <text class="label" x="395" y="640" text-anchor="middle">Surgery</text>

    <!-- x ticks -->
    <g>
      <line class="tick" x1="270" y1="790" x2="270" y2="806"/>
      <line class="tick" x1="400" y1="790" x2="400" y2="806"/>
      <line class="tick" x1="620" y1="790" x2="620" y2="806"/>
      <line class="tick" x1="840" y1="790" x2="840" y2="806"/>
      <line class="tick" x1="1060" y1="790" x2="1060" y2="806"/>
      <line class="tick" x1="1280" y1="790" x2="1280" y2="806"/>

      <text class="label" x="270" y="840" text-anchor="middle">-6m</text>
      <text class="label" x="400" y="840" text-anchor="middle">6w</text>
      <text class="label" x="620" y="840" text-anchor="middle">3m</text>
      <text class="label" x="840" y="840" text-anchor="middle">6m</text>
      <text class="label" x="1060" y="840" text-anchor="middle">9m</text>
      <text class="label" x="1280" y="840" text-anchor="middle">1y</text>
    </g>
  </g>

  <!-- phase bar -->
  <g id="phases" transform="translate(165,875)">
    <polygon class="phase1" points="0,0 170,0 190,28 170,56 0,56" />
    <polygon class="phase2" points="170,0 360,0 380,28 360,56 170,56 190,28" />
    <polygon class="phase3" points="360,0 620,0 640,28 620,56 360,56 380,28" />
    <polygon class="phase4" points="620,0 915,0 935,28 915,56 620,56 640,28" />
    <polygon class="phase5" points="915,0 1225,0 1245,28 1225,56 915,56 935,28" />

    <text class="phaselabel" x="85" y="35" text-anchor="middle">Preparation</text>
    <text class="phaselabel" x="275" y="35" text-anchor="middle">Surgery</text>
    <text class="phaselabel" x="500" y="35" text-anchor="middle">Early Recovery</text>
    <text class="phaselabel" x="777" y="35" text-anchor="middle">Functional Recovery</text>
    <text class="phaselabel" x="1070" y="35" text-anchor="middle">Strength &amp; Stability</text>
  </g>

  <text class="foot" x="800" y="970" text-anchor="middle">
    Conceptual visualization for JRRZ public-facing site; educational framework, not medical advice.
  </text>
</svg>
